version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bcms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bcms-network

networks:
  bcms-network:
    driver: bridge

volumes:
  postgres_data:
